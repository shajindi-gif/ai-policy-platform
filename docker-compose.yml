services:
  postgres:
    image: postgres:16
    container_name: ai_company_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: ai_company
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_company_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_company_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"

volumes:
  postgres_data:
